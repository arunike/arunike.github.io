<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#edf1e8" />
        <title>Richie Zhou | Portfolio</title>
        <meta
            name="description"
            content="Richie Zhou — Software Engineer specializing in full-stack development, machine learning, and scalable systems. Explore my projects, experience, and courses."
        />

        <link rel="canonical" href="https://arunike.github.io/" />
        <link rel="icon" href="/src/assets/logos/logo.png" />
        <script>
            (function () {
                var theme = localStorage.getItem("theme");
                if (theme !== "light" && theme !== "dark") {
                    theme =
                        window.matchMedia &&
                        window.matchMedia("(prefers-color-scheme: dark)")
                            .matches
                            ? "dark"
                            : "light";
                }
                document.documentElement.setAttribute("data-theme", theme);
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
